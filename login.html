<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧房屋租赁系统 - 登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.container { width: 100%; max-width: 440px; }
.logo { text-align: center; margin-bottom: 30px; }
.logo .icon { font-size: 48px; margin-bottom: 10px; }
.logo h1 { color: #fff; font-size: 28px; font-weight: 700; }
.logo p { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 8px; }
.card {
  background: #fff; border-radius: 16px; padding: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.tabs { display: flex; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; }
.tab {
  flex: 1; text-align: center; padding: 12px; cursor: pointer;
  font-size: 16px; font-weight: 600; color: #999;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all 0.3s;
}
.tab.active { color: #0f3460; border-bottom-color: #0f3460; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: 500; }
.form-group input, .form-group select {
  width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0;
  border-radius: 8px; font-size: 15px; transition: border-color 0.3s; outline: none;
}
.form-group input:focus, .form-group select:focus { border-color: #0f3460; }
.role-group { display: flex; gap: 12px; }
.role-option {
  flex: 1; padding: 14px; border: 2px solid #e0e0e0; border-radius: 10px;
  text-align: center; cursor: pointer; transition: all 0.3s;
}
.role-option:hover { border-color: #0f3460; }
.role-option.selected { border-color: #0f3460; background: rgba(15,52,96,0.05); }
.role-option .emoji { font-size: 28px; display: block; margin-bottom: 4px; }
.role-option .label { font-size: 14px; font-weight: 600; color: #333; }
.role-option .desc { font-size: 12px; color: #999; margin-top: 2px; }
.btn {
  width: 100%; padding: 14px; background: linear-gradient(135deg, #0f3460, #16213e);
  color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: all 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(15,52,96,0.4); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: 8px; color: #fff; font-size: 14px;
  z-index: 9999; transition: all 0.3s; opacity: 0; pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.success { background: #27ae60; }
.toast.error { background: #e74c3c; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="icon">🏠</div>
    <h1>智慧房屋租赁系统</h1>
    <p>安全 · 便捷 · 高效</p>
  </div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-tab="login" onclick="switchTab('login')">登录</div>
      <div class="tab" data-tab="register" onclick="switchTab('register')">注册</div>
    </div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="loginUsername" placeholder="请输入用户名" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn" id="loginBtn">登 录</button>
      <div style="text-align:center;margin-top:16px;font-size:13px;color:#999;">
        测试账号：房东 landlord1 / 123456 | 租客 tenant1 / 123456
      </div>
    </form>

    <!-- Register Form -->
    <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="regUsername" placeholder="请输入用户名" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="regPassword" placeholder="请输入密码（至少6位）" required minlength="6">
      </div>
      <div class="form-group">
        <label>手机号</label>
        <input type="tel" id="regPhone" placeholder="请输入手机号" required>
      </div>
      <div class="form-group">
        <label>真实姓名</label>
        <input type="text" id="regRealName" placeholder="请输入真实姓名">
      </div>
      <div class="form-group">
        <label>选择角色</label>
        <div class="role-group">
          <div class="role-option selected" data-role="1" onclick="selectRole(1, this)">
            <span class="emoji">👨‍💼</span>
            <span class="label">租客</span>
            <span class="desc">浏览 & 租用房屋</span>
          </div>
          <div class="role-option" data-role="2" onclick="selectRole(2, this)">
            <span class="emoji">🏡</span>
            <span class="label">房东</span>
            <span class="desc">发布 & 管理房源</span>
          </div>
        </div>
      </div>
      <button type="submit" class="btn" id="regBtn">注 册</button>
    </form>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = 'http://8.148.68.72:5000/api/v1';
let selectedRole = 1;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
}

function selectRole(role, el) {
  selectedRole = role;
  document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => { toast.classList.remove('show'); }, 3000);
}

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  if (!username || !password) { showToast('请填写用户名和密码', 'error'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中...';

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.code === 200) {
      localStorage.setItem('token', data.data.token);
      localStorage.setItem('userInfo', JSON.stringify(data.data.userInfo));
      showToast('登录成功！', 'success');

      setTimeout(() => {
        if (data.data.userInfo.role === 2) {
          window.location.href = '/landlord/';
        } else {
          window.location.href = '/tenant/houses.html';
        }
      }, 800);
    } else {
      showToast(data.message || '登录失败', 'error');
    }
  } catch (err) {
    showToast('网络错误，请检查服务器连接', 'error');
  } finally {
    btn.disabled = false; btn.textContent = '登 录';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const realName = document.getElementById('regRealName').value.trim();

  if (!username || !password || !phone) { showToast('请填写必填项', 'error'); return; }
  if (password.length < 6) { showToast('密码至少6位', 'error'); return; }

  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = '注册中...';

  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, phone, realName ,role: selectedRole })
    });
    const data = await res.json();

    if (data.code === 200) {
      showToast('注册成功！请登录', 'success');
      switchTab('login');
      document.getElementById('loginUsername').value = username;
      document.getElementById('loginPassword').value = '';
    } else {
      showToast(data.message || '注册失败', 'error');
    }
  } catch (err) {
    showToast('网络错误，请检查服务器连接', 'error');
  } finally {
    btn.disabled = false; btn.textContent = '注 册';
  }
}
</script>
</body>
</html>
